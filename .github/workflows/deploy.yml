name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t symbol-table-app .

      - name: Tag Docker Image
        run: |
          docker tag symbol-table-app:latest 461313338379.dkr.ecr.us-east-1.amazonaws.com/symbol-table-app:latest

      - name: Push Docker Image to ECR
        run: |
          docker push 461313338379.dkr.ecr.us-east-1.amazonaws.com/symbol-table-app:latest

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "i-09d527aedc56e0d90" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="
              docker pull 461313338379.dkr.ecr.us-east-1.amazonaws.com/symbol-table-app:latest
              docker stop symbol-table-app || true
              docker rm symbol-table-app || true
              docker run -d -p 8501:8501 \
              --name symbol-table-app \
              461313338379.dkr.ecr.us-east-1.amazonaws.com/symbol-table-app:latest
            "
