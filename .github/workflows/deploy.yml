name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t symbol-table-app .

      - name: Tag Docker Image
        run: |
          docker tag symbol-table-app:latest \
          461313338379.dkr.ecr.us-east-1.amazonaws.com/symbol-table-app:latest

      - name: Push Docker Image
        run: |
          docker push \
          461313338379.dkr.ecr.us-east-1.amazonaws.com/symbol-table-app:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 461313338379.dkr.ecr.us-east-1.amazonaws.com

            docker pull 461313338379.dkr.ecr.us-east-1.amazonaws.com/symbol-table-app:latest

            docker stop symbol-table-app || true
            docker rm symbol-table-app || true

            docker run -d \
              --name symbol-table-app \
              -p 8501:8501 \
              461313338379.dkr.ecr.us-east-1.amazonaws.com/symbol-table-app:latest
