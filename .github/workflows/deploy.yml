name: Deploy to AWS EC2 via ECR

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1. Checkout Code
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # 2. Configure AWS Credentials
      # -------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -------------------------
      # 3. Login to Amazon ECR
      # -------------------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # -------------------------
      # 4. Build Docker Image
      # -------------------------
      - name: Build Docker Image
        run: |
          docker build -t symbol-table-app .

      # -------------------------
      # 5. Tag Docker Image
      # -------------------------
      - name: Tag Docker Image
        run: |
          docker tag symbol-table-app:latest 461313338379.dkr.ecr.us-east-1.amazonaws.com/symbol-table-app:latest

      # -------------------------
      # 6. Push Docker Image to ECR
      # -------------------------
      - name: Push Docker Image to ECR
        run: |
          docker push 461313338379.dkr.ecr.us-east-1.amazonaws.com/symbol-table-app:latest
